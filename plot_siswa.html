<!-- FILE: plot_siswa.html -->
<style>
  .table-glass-blue { border-collapse: separate; border-spacing: 0; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 32px rgba(0,0,0,0.15); width: 100%; }
  .table-glass-blue thead th { background: rgba(15, 23, 42, 0.85) !important; color: #f8fafc !important; font-weight: 600; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px; border-bottom: 2px solid rgba(255,255,255,0.1); padding: 15px; }
  .table-glass-blue tbody td { background: rgba(30, 41, 59, 0.6) !important; color: #f1f5f9 !important; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 10px 15px; vertical-align: middle; }
  .table-glass-blue tbody tr:hover td { background: rgba(51, 65, 85, 0.8) !important; color: #ffffff !important; transition: 0.2s; }
  
  .dataTables_wrapper .dataTables_filter input { background: rgba(255,255,255,0.9) !important; border-radius: 8px; border: none; padding: 6px 12px; color: #000; outline: none; }
  .dataTables_wrapper .dataTables_filter label { color: rgba(255,255,255,0.9) !important; font-weight: 500; }
  .dataTables_length, .dataTables_info, .dataTables_paginate { display: none !important; }
  .custom-checkbox { width: 22px; height: 22px; cursor: pointer; accent-color: #0ea5e9; }
  .custom-checkbox:disabled { cursor: not-allowed; opacity: 0.5; }
  .modal-glass-light { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.8); box-shadow: 0 15px 50px rgba(0, 0, 0, 0.2); border-radius: 16px; color: #2c3e50; }
  
  /* Kustomisasi Accordion Rekap */
  .accordion-item { border-radius: 10px !important; margin-bottom: 10px; border: 1px solid rgba(0,0,0,0.1); overflow: hidden; }
  .accordion-button { background: rgba(14, 165, 233, 0.1); font-weight: 600; color: #0f172a; }
  .accordion-button:not(.collapsed) { background: #0ea5e9; color: white; box-shadow: none; }
  .accordion-button:focus { box-shadow: none; border-color: transparent; }
</style>
<div class="row mb-3">
  <div class="col-12 text-center text-md-start">
    <h4 class="text-glass fw-bold mb-1">Plotting Rombongan Belajar</h4>
    <p class="text-glass" style="opacity: 0.85; font-size: 0.85rem;">Pilih Tahun Ajaran & Kelas, lalu centang siswa.</p>
  </div>
</div>
<!-- PANEL FILTER -->
<div class="card glass-card p-3 mb-4" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);">
  <div class="row g-3 align-items-end">
    <div class="col-md-3">
      <label class="form-label text-white fw-medium mb-1" style="font-size: 0.85rem;">Tahun Ajaran</label>
      <select id="filter_ta" class="form-select glass-input px-3 py-2 fw-medium"></select>
    </div>
    <div class="col-md-4">
      <label class="form-label text-white fw-medium mb-1" style="font-size: 0.85rem;">Kelas / Rombel</label>
      <select id="filter_kelas" class="form-select glass-input px-3 py-2 fw-medium">
        <option value="">-- Memuat Kelas... --</option>
      </select>
    </div>
    <div class="col-md-2">
      <button class="btn btn-warning w-100 fw-bold py-2 shadow-sm" onclick="window.loadPlottingData()" style="border-radius: 8px;">
        <i class="fa-solid fa-check me-1"></i> Input
      </button>
    </div>
    <div class="col-md-3">
      <!-- TOMBOL DROPDOWN MENU REKAP -->
      <div class="dropdown">
        <button class="btn btn-light w-100 fw-bold py-2 shadow-sm dropdown-toggle" type="button" data-bs-toggle="dropdown" style="border-radius: 8px;">
          <i class="fa-solid fa-list-check me-2 text-primary"></i> Menu Rekap
        </button>
        <ul class="dropdown-menu w-100 shadow border-0" style="border-radius: 10px;">
          <li><a class="dropdown-item fw-medium py-2" href="#" onclick="window.bukaModalRekap()"><i class="fa-solid fa-layer-group text-success me-2"></i> Rekap Seluruh Kelas</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item fw-medium py-2" href="#" onclick="window.bukaModalBelumPlot()"><i class="fa-solid fa-user-xmark text-danger me-2"></i> Siswa Belum Plotting</a></li>
        </ul>
      </div>
    </div>
  </div>
</div>
<!-- PANEL TABEL SISWA (Form Input Plotting) -->
<div class="card glass-card p-3 p-md-4 mb-5" id="panel-tabel" style="background: rgba(255,255,255,0.05); border: none; display: none;">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div class="form-check">
      <input class="form-check-input custom-checkbox" type="checkbox" id="checkAll" onchange="window.toggleAllCheckboxes()">
      <label class="form-check-label text-white fw-bold ms-2 mt-1" for="checkAll">Centang Semua (Yang Tersedia)</label>
    </div>
    <span class="badge bg-info text-dark px-3 py-2 rounded-pill fw-bold" id="counter-terpilih">0 Terpilih</span>
  </div>
  <div class="table-responsive" style="width: 100%; overflow-x: auto;">
    <table id="tabelPlotSiswa" class="table table-glass-blue w-100">
      <thead>
        <tr>
          <th width="5%" class="text-center">Pilih</th>
          <th width="15%" class="d-none d-md-table-cell text-center">NIS</th>
          <th width="40%">Nama Lengkap</th>
          <th width="10%" class="text-center">L/P</th>
          <th width="30%" class="text-center">Status Saat Ini</th>
        </tr>
      </thead>
      <tbody id="data-plot-body"></tbody>
    </table>
  </div>
  
  <div class="mt-4 text-end">
    <button class="btn btn-primary fw-bold shadow px-5 py-2" onclick="window.simpanPlotting()" style="background: linear-gradient(135deg, #10b981, #059669); border: none; border-radius: 10px;">
      <i class="fa-solid fa-floppy-disk me-2"></i> SIMPAN PLOTTING KELAS
    </button>
  </div>
</div>
<!-- MODAL 1: REKAP SELURUH KELAS -->
<div class="modal fade" id="modalRekapKelas" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
    <div class="modal-content modal-glass-light text-dark" style="height: 80vh;">
      <div class="modal-header border-bottom border-secondary border-opacity-25 py-3">
        <h5 class="modal-title fw-bold text-dark"><i class="fa-solid fa-layer-group me-2 text-success"></i>Rekapitulasi Kelas <span id="title-rekap-ta" class="badge bg-primary ms-2"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body bg-light" id="body-rekap-kelas">
        <!-- Akan dirender via Accordion JS -->
        <div class="text-center py-5"><div class="spinner-border text-primary"></div></div>
      </div>
    </div>
  </div>
</div>
<!-- MODAL 2: SISWA BELUM PLOTTING -->
<div class="modal fade" id="modalBelumPlot" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg modal-dialog-scrollable">
    <div class="modal-content modal-glass-light text-dark" style="height: 80vh;">
      <div class="modal-header border-bottom border-secondary border-opacity-25 py-3">
        <h5 class="modal-title fw-bold text-dark"><i class="fa-solid fa-user-xmark me-2 text-danger"></i>Siswa Belum Dapat Kelas <span id="title-belum-ta" class="badge bg-primary ms-2"></span></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-0">
        <table class="table table-striped table-hover mb-0">
          <thead class="table-dark sticky-top">
            <tr>
              <th class="text-center" width="10%">No</th>
              <th width="20%">NIS</th>
              <th width="50%">Nama Lengkap</th>
              <th class="text-center" width="20%">L/P</th>
            </tr>
          </thead>
          <tbody id="body-belum-plot">
            <!-- Akan dirender via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script>
  window.masterSiswa = [];
  window.masterKelas = [];
  // Pindahkan modal ke luar SPA Container agar tidak terhalang shadow hitam
  $('.modal-rekap-wrapper').remove(); 
  const modalWrapRekap = document.createElement('div');
  modalWrapRekap.className = 'modal-rekap-wrapper';
  modalWrapRekap.appendChild(document.getElementById('modalRekapKelas'));
  modalWrapRekap.appendChild(document.getElementById('modalBelumPlot'));
  document.body.appendChild(modalWrapRekap);
  
  window.generateTahunAjaran = function() {
    const taSelect = document.getElementById('filter_ta');
    let html = '';
    const currentYear = new Date().getFullYear(); 
    for(let year = 2024; year <= 2050; year++) {
      const nextYear = year + 1;
      const optionText = `${year}/${nextYear}`;
      const isSelected = (year === currentYear) ? 'selected' : '';
      html += `<option value="${optionText}" ${isSelected}>${optionText}</option>`;
    }
    taSelect.innerHTML = html;
  };
  
  window.generateTahunAjaran();
  google.script.run
    .withSuccessHandler(function(res) {
      if(res.status === "success") {
        window.masterSiswa = res.siswa;
        window.masterKelas = res.kelas; 
        
        let htmlKelas = '<option value="">-- Pilih Kelas --</option>';
        res.kelas.forEach(k => {
          htmlKelas += `<option value="${k.id_kelas}">${k.nama_kelas} (Tingkat ${k.tingkat})</option>`;
        });
        document.getElementById('filter_kelas').innerHTML = htmlKelas;
      }
    })
    .getInitPlotSiswa();
    
  // FUNGSI LOAD FORM INPUT PLOTTING
  window.loadPlottingData = function() {
    const ta = document.getElementById('filter_ta').value;
    const idKelas = document.getElementById('filter_kelas').value;
    if(!idKelas) { Swal.fire('Perhatian', 'Pilih Kelas terlebih dahulu!', 'warning'); return; }
    Swal.fire({ title: 'Menyiapkan Form...', background: 'rgba(15, 23, 42, 0.95)', color: '#fff', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
    google.script.run
      .withSuccessHandler(function(res) {
        Swal.close();
        if(res.status === "success") {
          window.renderTabelPlotting(res.inThisClass, res.inOtherClass);
          document.getElementById('panel-tabel').style.display = 'block';
        } else { Swal.fire('Error', res.message, 'error'); }
      })
      .getSiswaByKelas(ta, idKelas);
  };
  
  window.renderTabelPlotting = function(inThisClass, inOtherClass) {
    if ($.fn.DataTable.isDataTable('#tabelPlotSiswa')) {
      $('#tabelPlotSiswa').DataTable().clear().destroy();
    }
    
    let html = ''; let checkedCount = 0; let availableCount = 0;
    window.masterSiswa.forEach(siswa => {
      const isInThis = inThisClass.includes(siswa.id_siswa);
      const dataInOther = inOtherClass.find(o => o.id_siswa === siswa.id_siswa);
      const isInOther = !!dataInOther;
      
      let isChecked = isInThis ? 'checked' : '';
      let isDisabled = isInOther ? 'disabled' : ''; 
      
      if(isInThis) checkedCount++;
      if(!isInOther) availableCount++;
      let badgeStatus = '';
      if(isInThis) {
        badgeStatus = '<span class="badge bg-success shadow-sm px-3 py-2 rounded-pill"><i class="fa-solid fa-check me-1"></i> Di Kelas Ini</span>';
      } else if(isInOther) {
        let namaKelasLain = 'Kelas Lain';
        const kls = window.masterKelas.find(k => k.id_kelas === dataInOther.id_kelas);
        if(kls) namaKelasLain = kls.nama_kelas;
        badgeStatus = `<span class="badge bg-secondary shadow-sm px-3 py-2 rounded-pill" style="opacity: 0.8;"><i class="fa-solid fa-lock me-1"></i> Di ${namaKelasLain}</span>`;
      } else {
        badgeStatus = '<span class="badge bg-light text-dark shadow-sm px-3 py-2 rounded-pill border">Belum Plot</span>';
      }
      html += `<tr>
        <td class="text-center"><input type="checkbox" class="custom-checkbox cb-siswa" value="${siswa.id_siswa}" ${isChecked} ${isDisabled} onchange="window.updateCounter()"></td>
        <td class="text-center d-none d-md-table-cell" style="color: #94a3b8;">${siswa.nis}</td>
        <td class="fw-bold">${siswa.nama_lengkap}</td>
        <td class="text-center fw-medium">${siswa.jk}</td>
        <td class="text-center">${badgeStatus}</td>
      </tr>`;
    });
    document.getElementById('data-plot-body').innerHTML = html;
    document.getElementById('checkAll').checked = (checkedCount === availableCount && availableCount > 0);
    window.updateCounter();
    
    $('#tabelPlotSiswa').DataTable({
      destroy: true, language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/id.json', search: "Cari:" }, ordering: false, paging: false, info: false, lengthChange: false
    });
  };
  
  window.toggleAllCheckboxes = function() {
    const isChecked = document.getElementById('checkAll').checked;
    const table = $('#tabelPlotSiswa').DataTable();
    table.$('input[type="checkbox"]:not(:disabled)').prop('checked', isChecked);
    window.updateCounter();
  };
  
  window.updateCounter = function() {
    const table = $('#tabelPlotSiswa').DataTable();
    const count = table.$('input[type="checkbox"]:checked').length;
    document.getElementById('counter-terpilih').innerText = `${count} Terpilih`;
  };
  
  window.simpanPlotting = function() {
    const ta = document.getElementById('filter_ta').value;
    const idKelas = document.getElementById('filter_kelas').value;
    if(!idKelas) return;
    const table = $('#tabelPlotSiswa').DataTable();
    let selectedIds = [];
    table.$('input[type="checkbox"]:checked').each(function() { selectedIds.push($(this).val()); });
    Swal.fire({
      title: 'Simpan Rombel?', text: `Menempatkan ${selectedIds.length} siswa ke kelas ini.`, icon: 'question', showCancelButton: true, confirmButtonColor: '#10b981', confirmButtonText: 'Ya, Simpan!', background: 'rgba(15, 23, 42, 0.95)', color: '#fff'
    }).then((res) => {
      if(res.isConfirmed) {
        Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, background: 'rgba(15, 23, 42, 0.95)', color: '#fff', didOpen: () => { Swal.showLoading() } });
        google.script.run
          .withSuccessHandler(function(response) {
            if(response.status === "success") {
              Swal.fire({ icon: 'success', title: 'Tersimpan!', text: response.message, timer: 1500, showConfirmButton: false, background: 'rgba(15, 23, 42, 0.95)', color: '#fff' });
              document.getElementById('panel-tabel').style.display = 'none'; 
              document.getElementById('filter_kelas').value = ''; 
              document.getElementById('counter-terpilih').innerText = '0 Terpilih';
            } else { Swal.fire('Gagal', response.message, 'error'); }
          })
          .savePlottingSiswa(ta, idKelas, selectedIds);
      }
    });
  };
  
  // ==========================================
  // LOGIKA MODAL MENU REKAP
  // ==========================================
  window.fetchRekapData = function(callback) {
    const ta = document.getElementById('filter_ta').value;
    document.getElementById('title-rekap-ta').innerText = ta;
    document.getElementById('title-belum-ta').innerText = ta;
    
    Swal.fire({ title: 'Mengambil Rekap...', background: 'rgba(15, 23, 42, 0.95)', color: '#fff', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });
    
    google.script.run.withSuccessHandler(function(res) {
      Swal.close();
      if(res.status === 'success') {
        callback(res);
      } else { Swal.fire('Error', res.message, 'error'); }
    }).getRekapPlotting(ta);
  };
  
  window.bukaModalRekap = function() {
    window.fetchRekapData(function(res) {
      let html = '<div class="accordion" id="accordionRekap">';
      
      res.rekapKelas.forEach((kelas, idx) => {
        let listSiswa = '';
        if(kelas.siswa.length === 0) {
          listSiswa = '<p class="text-muted text-center my-3"><em>Belum ada siswa di kelas ini.</em></p>';
        } else {
          listSiswa = '<table class="table table-sm table-bordered"><thead><tr class="table-light"><th>No</th><th>NIS</th><th>Nama Siswa</th><th>L/P</th></tr></thead><tbody>';
          kelas.siswa.forEach((s, i) => {
            listSiswa += `<tr><td class="text-center">${i+1}</td><td>${s.nis}</td><td class="fw-bold">${s.nama_lengkap}</td><td class="text-center">${s.jk}</td></tr>`;
          });
          listSiswa += '</tbody></table>';
        }
        html += `
          <div class="accordion-item">
            <h2 class="accordion-header" id="heading${idx}">
              <button class="accordion-button ${idx !== 0 ? 'collapsed' : ''}" type="button" data-bs-toggle="collapse" data-bs-target="#collapse${idx}">
                <i class="fa-solid fa-school me-2"></i> ${kelas.nama_kelas} 
                <span class="badge bg-warning text-dark ms-auto me-2">${kelas.siswa.length} Siswa</span>
              </button>
            </h2>
            <div id="collapse${idx}" class="accordion-collapse collapse ${idx === 0 ? 'show' : ''}" data-bs-parent="#accordionRekap">
              <div class="accordion-body p-3">${listSiswa}</div>
            </div>
          </div>
        `;
      });
      html += '</div>';
      
      document.getElementById('body-rekap-kelas').innerHTML = html;
      new bootstrap.Modal(document.getElementById('modalRekapKelas')).show();
    });
  };
  
  window.bukaModalBelumPlot = function() {
    window.fetchRekapData(function(res) {
      let html = '';
      if(res.belumPlot.length === 0) {
        html = '<tr><td colspan="4" class="text-center py-5 text-success fw-bold"><i class="fa-solid fa-check-circle fa-2x mb-2 d-block"></i> Luar biasa! Seluruh siswa aktif sudah mendapatkan kelas.</td></tr>';
      } else {
        res.belumPlot.forEach((s, i) => {
          html += `<tr>
            <td class="text-center fw-medium">${i+1}</td>
            <td>${s.nis}</td>
            <td class="fw-bold text-danger">${s.nama_lengkap}</td>
            <td class="text-center">${s.jk}</td>
          </tr>`;
        });
      }
      
      document.getElementById('body-belum-plot').innerHTML = html;
      new bootstrap.Modal(document.getElementById('modalBelumPlot')).show();
    });
  };
</script>
