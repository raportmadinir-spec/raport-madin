<!-- FILE: index.html -->
<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>SIM RAPORT MADIN</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.12/dist/sweetalert2.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- DataTables CSS Dipindah ke sini agar bisa diakses semua halaman -->
  <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">

  <style>
    body { 
      font-family: 'Poppins', sans-serif; 
      background: url('https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2000&auto=format&fit=crop') no-repeat center center fixed; 
      background-size: cover; 
      margin: 0; 
      padding: 0; 
    }
    .glass-card { 
      background: rgba(255, 255, 255, 0.15); 
      backdrop-filter: blur(15px); 
      -webkit-backdrop-filter: blur(15px); 
      border-radius: 20px; 
      border: 1px solid rgba(255, 255, 255, 0.3); 
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2); 
    }
    .glass-input { 
      background: rgba(255, 255, 255, 0.6) !important; 
      border: 1px solid rgba(255, 255, 255, 0.4) !important; 
      color: #333 !important; 
      border-radius: 10px; 
    }
    .text-glass { 
      color: #ffffff; 
      text-shadow: 1px 1px 3px rgba(0,0,0,0.4); 
    }
  </style>
</head>
<body>
  <div id="app-container">
    <div class="d-flex flex-column justify-content-center align-items-center" style="min-height: 100vh;">
      <div class="spinner-border text-light" style="width: 3rem; height: 3rem;"></div>
      <h5 class="text-white mt-3 text-glass">Memuat Sistem...</h5>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.12/dist/sweetalert2.all.min.js"></script>
  
  <!-- DataTables JS Dipindah ke sini -->
  <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
  <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>

  <script>
    window.renderHtml = function(htmlContent) {
      document.getElementById('app-container').innerHTML = htmlContent;
      const scripts = document.getElementById('app-container').getElementsByTagName('script');
      for (let i = 0; i < scripts.length; i++) { 
        try { 
          eval(scripts[i].innerText); 
        } catch(e) { 
          console.error("Error merender script:", e); 
        } 
      }
    };
    
    $(document).ready(function() {
      const session = localStorage.getItem('sim_session');
      if (session) { 
        google.script.run.withSuccessHandler(window.renderHtml).loadPage('layout'); 
      } else { 
        google.script.run.withSuccessHandler(window.renderHtml).loadPage('login'); 
      }
    });
  </script>
</body>
</html>
